app = 'aether-bootstrap'
primary_region = 'ord'

[build]

[http_service]
  internal_port = 7070
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[services]]
  protocol = 'tcp'
  internal_port = 7070

  [[services.ports]]
    port = 7070

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
