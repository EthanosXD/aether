name: AI Network Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:          # Allow manual trigger

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Check Network Health
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          BOOTSTRAP_URL="https://aether-xcem.onrender.com"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          ALERT_LABEL="network-alert"

          # ── Check bootstrap server ──
          HEALTH=$(curl -s --max-time 15 "$BOOTSTRAP_URL/health" || echo "ERROR")
          PEERS_RAW=$(curl -s --max-time 15 "$BOOTSTRAP_URL/peers" || echo "ERROR")

          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            SERVER_STATUS="online"
            PEER_COUNT=$(echo "$PEERS_RAW" | jq -r '.count // 0')
          else
            SERVER_STATUS="offline"
            PEER_COUNT=0
          fi

          echo "Bootstrap: $SERVER_STATUS | Peers: $PEER_COUNT"

          gemini_generate() {
            local prompt="$1"
            jq -n --arg text "$prompt" \
              '{contents: [{parts: [{text: $text}]}]}' \
              > /tmp/payload.json
            curl -s -X POST \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
              -H "content-type: application/json" \
              -d @/tmp/payload.json | jq -r '.candidates[0].content.parts[0].text'
          }

          # ── Handle outage ──
          if [ "$SERVER_STATUS" = "offline" ]; then
            # Check if an alert issue is already open
            OPEN_ALERT=$(gh issue list \
              --repo "$REPO" \
              --label "$ALERT_LABEL" \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [ -z "$OPEN_ALERT" ]; then
              # Create alert label if it doesn't exist
              gh label create "$ALERT_LABEL" --color "d93f0b" --description "Network health alert" --repo "$REPO" 2>/dev/null || true

              INCIDENT=$(gemini_generate "Write a short GitHub issue body reporting that the Aether bootstrap server at aether-xcem.onrender.com went offline at $TIMESTAMP. Include: what is affected (peer discovery across the internet — LAN discovery still works), what users should do (check logs, LAN peers still connect), and that the team is investigating. Keep it under 150 words. Plain text, minimal markdown.")

              gh issue create \
                --repo "$REPO" \
                --title "🚨 Bootstrap server offline — $TIMESTAMP" \
                --body "$INCIDENT" \
                --label "$ALERT_LABEL"

              echo "Alert issue created"
            else
              echo "Alert already open (#$OPEN_ALERT), skipping"
            fi

          else
            # ── Server is healthy — close any open alerts ──
            OPEN_ALERT=$(gh issue list \
              --repo "$REPO" \
              --label "$ALERT_LABEL" \
              --state open \
              --json number \
              --jq '.[0].number // empty')

            if [ -n "$OPEN_ALERT" ]; then
              RECOVERY_MSG="✅ Bootstrap server is back online as of $TIMESTAMP. Active peers: $PEER_COUNT. Closing incident."
              gh issue comment "$OPEN_ALERT" --repo "$REPO" --body "$RECOVERY_MSG"
              gh issue close "$OPEN_ALERT" --repo "$REPO"
              echo "Incident #$OPEN_ALERT resolved"
            fi

            # ── Post weekly network stats (Mondays at 9am UTC) ──
            DAY=$(date -u '+%u')   # 1=Mon
            HOUR=$(date -u '+%H')
            if [ "$DAY" = "1" ] && [ "$HOUR" = "09" ]; then
              STATS=$(gemini_generate "Write a short, enthusiastic weekly network status update for the Aether P2P internet project. Current stats: $PEER_COUNT active nodes on the network as of $TIMESTAMP. Celebrate the nodes running, mention that the network is growing, encourage people to install and run a node. Under 120 words. Friendly tone.")

              gh issue create \
                --repo "$REPO" \
                --title "📊 Weekly Network Update — $TIMESTAMP" \
                --body "$STATS" \
                --label "network-update" 2>/dev/null || true

              echo "Weekly update posted"
            fi
          fi
