name: AI Support Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  respond:
    runs-on: ubuntu-latest
    # Don't respond to our own comments
    if: github.actor != 'github-actions[bot]'

    permissions:
      issues: write

    steps:
      - name: AI Response
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
        run: |
          # Build context depending on whether this is a new issue or a comment
          if [ "$EVENT" = "issues" ]; then
            CONTEXT="New issue titled: \"$ISSUE_TITLE\"\n\nContent:\n$ISSUE_BODY"
          else
            CONTEXT="Follow-up comment on issue \"$ISSUE_TITLE\":\n\n$COMMENT_BODY"
          fi

          # Build JSON payload safely using a temp file
          SYSTEM="You are the support AI for Aether, a free open-source peer-to-peer internet network. Aether lets people bypass ISPs and censorship by routing traffic through a network of community-run nodes. It uses a SOCKS5 proxy (localhost:1080), connects to a bootstrap server at aether-xcem.onrender.com, and is installed with a single curl command. Be helpful, friendly, and concise. If it is a bug report, ask for their OS and node logs. If it is a feature request, acknowledge it and explain the roadmap. If it is a question, answer it clearly. End with a note that a human maintainer will also review this. Do not use excessive formatting."

          jq -n \
            --arg system "$SYSTEM" \
            --arg context "$CONTEXT" \
            '{
              systemInstruction: {parts: [{text: $system}]},
              contents: [{parts: [{text: $context}]}]
            }' \
            > /tmp/payload.json

          # Call Gemini API
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "content-type: application/json" \
            -d @/tmp/payload.json)

          echo "API error: $(echo "$RESPONSE" | jq -r '.error.message // "none"')"

          # Extract the text from the response
          COMMENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          if [ -z "$COMMENT" ] || [ "$COMMENT" = "null" ]; then
            echo "Failed to get AI response — raw: $RESPONSE"
            exit 0
          fi

          # Post the comment to the issue
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --body "$COMMENT"
