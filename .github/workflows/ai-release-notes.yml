name: AI Release Notes

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'README.md'

jobs:
  summarize:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Summarize Changes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Get the diff summary from last 2 commits
          DIFF=$(git diff HEAD~1 HEAD --stat 2>/dev/null | head -20 || echo "Initial commit")
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u '+%Y-%m-%d')

          PROMPT="Write a short, friendly changelog entry for an Aether P2P network update. Commit: $SHORT_SHA. Message: $COMMIT_MSG. Files changed: $DIFF. Write 2-4 bullet points summarizing what changed in plain English for non-technical users. Start with what is new or fixed, not technical details. Keep it under 100 words."

          jq -n --arg text "$PROMPT" \
            '{contents: [{parts: [{text: $text}]}]}' \
            > /tmp/payload.json

          SUMMARY=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "content-type: application/json" \
            -d @/tmp/payload.json | jq -r '.candidates[0].content.parts[0].text')

          gh issue create \
            --repo "$REPO" \
            --title "🔄 Update $SHORT_SHA — $TIMESTAMP" \
            --body "$SUMMARY" \
            --label "changelog" 2>/dev/null || true
